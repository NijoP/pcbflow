# PCB Flow project manifest — the orchestrator's source of truth for this board.
# References DECISIONS and STATE, never volatile artifact paths (a status must not
# be able to lie because a file was deleted).

project:
  name: "<board-name>"
  description: "<one line>"
  client: "<client>"
  created: "<YYYY-MM-DD>"

board:
  dimensions_mm: [null, null]      # W x H  (fixed in Phase 6)
  shape: "rectangle"               # or the mechanical outline
  layers: null                     # 2 / 4 / 6  (decided in Phase 1, set in Phase 3)
  stackup: "<e.g. F 1oz / In1 GND / In2 VSYS / B 1oz>"
  fab: "<e.g. JLCPCB 4-layer>"

status:
  current_phase: 1                 # 1..12
  phase_verdicts:                  # append a dated verdict per phase gate
    - phase: 1
      verdict: "PENDING"           # PASS / CONDITIONAL / FAIL / PENDING
      date: "<YYYY-MM-DD>"
      note: ""

key_decisions:                     # the durable reasoning (why the board is this way)
  - decision: "<e.g. 4-layer for the 10.5A motor rail>"
    rationale: "<the math/why>"
    date: "<YYYY-MM-DD>"

open_gates:                        # human sign-offs still required (client/cost/DRC/order)
  - "<e.g. client to confirm board size>"

lessons_to_upstream: []            # lessons discovered here → knowledge/learning-db.md
